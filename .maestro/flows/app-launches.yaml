- assertVisible:
    id: "btn-start"
- assertVisible:
    id: "btn-red"
- assertVisible:
    id: "btn-blue"
- assertVisible:
    id: "btn-green"
- assertVisible:
    id: "btn-yellow"
- assertVisible: "Leaderboard"
- assertVisible: "Statistics"
- assertVisible: "Achievements"
- assertVisible: "Select game mode"
- assertVisible: "Settings"
