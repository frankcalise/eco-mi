# Game over: complete level 1, fail level 2, verify full game-over flow
# Requires app built with EXPO_PUBLIC_TEST_SEED=42
# Seed 42 level 1 expects green; level 2 also starts with green
appId: ${MAESTRO_APP_ID}
tags:
  - gameplay
  - pr
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- tapOn:
    id: "btn-start"

# Wait for initial sequence delay (500ms) + level 1 sequence playback
- waitForAnimationToEnd
- waitForAnimationToEnd

# Complete level 1 (green)
- tapOn:
    id: "btn-green"

# Wait for level 2 sequence (2 colors × ~1s interval + advancing delay)
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Tap wrong color — level 2 also starts with green, so red is wrong
- tapOn:
    id: "btn-red"

# Score is 10 → qualifies for leaderboard → inline initials on game-over
# Skip initials entry (first-time prompt)
- extendedWaitUntil:
    visible:
      id: "btn-skip-initials"
    timeout: 10000

- tapOn:
    id: "btn-skip-initials"

- extendedWaitUntil:
    visible:
      id: "btn-play-again"
    timeout: 5000
- assertVisible:
    id: "btn-share"

# Tap play again → returns to game and starts new round
- tapOn:
    id: "btn-play-again"

- waitForAnimationToEnd

- assertNotVisible:
    id: "btn-play-again"
