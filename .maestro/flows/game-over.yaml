# Game over: start game, tap wrong color, verify game-over screen appears with all buttons
# Requires app built with EXPO_PUBLIC_TEST_SEED=42
# Seed 42 level 1 expects green — we tap red to fail
appId: ${MAESTRO_APP_ID}
tags:
  - gameplay
  - pr
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- tapOn:
    id: "btn-start"

- waitForAnimationToEnd

# Tap wrong color (seed 42 expects green, tap red)
- tapOn:
    id: "btn-red"

- waitForAnimationToEnd

# Wait for game-over screen (full route now, not overlay)
- extendedWaitUntil:
    visible:
      id: "btn-play-again"
    timeout: 10000
- assertVisible:
    id: "btn-share"

# Tap play again — returns to game screen and starts new game
- tapOn:
    id: "btn-play-again"

- waitForAnimationToEnd

# Game-over screen should be gone, gameplay button visible
- assertNotVisible:
    id: "btn-play-again"
