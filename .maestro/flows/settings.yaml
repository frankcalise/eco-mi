# Settings: verify gear button exists on idle screen
#
# NOTE: We can't tap btn-settings in dev builds because the Expo Dev Client
# floating action button (FAB) overlaps the settings gear icon in the top-right
# corner and receives the tap instead (opens dev menu). The FAB is removed in
# production builds, and expo-dev-launcher v55.0.24+ will add a `toolsButton: false`
# config plugin option to disable it — once that ships we can add full navigation
# + interaction testing here. See expo/expo#44234 and expo/expo#44251.
#
# Full settings interaction is verified via unit tests and manual testing.
appId: ${MAESTRO_APP_ID}
tags:
  - settings
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- assertVisible:
    id: "btn-start"
- assertVisible:
    id: "btn-settings"
