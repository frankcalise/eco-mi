# Settings: verify settings button exists on idle screen
# NOTE: ModalOverlay (absolute-positioned) has known Maestro visibility issues
# on iOS — the overlay renders correctly but Maestro's accessibility tree
# doesn't reliably detect elements inside it. Full settings interaction is
# verified via manual testing. This flow verifies the button exists.
appId: ${MAESTRO_APP_ID}
tags:
  - settings
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- assertVisible:
    id: "btn-start"
- assertVisible:
    id: "btn-settings"
