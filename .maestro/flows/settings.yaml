# Settings: navigate to dedicated /settings screen, verify, go back
appId: ${MAESTRO_APP_ID}
tags:
  - settings
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- assertVisible:
    id: "btn-start"
- assertVisible:
    id: "btn-settings"

# Open settings via testID
- tapOn:
    id: "btn-settings"
- waitForAnimationToEnd

# Settings screen visible
- assertVisible: "Settings"

# Sound toggle present
- assertVisible:
    id: "btn-sound-toggle"

# Back via accessibility label on header back button
- tapOn: "Back"
- waitForAnimationToEnd

- assertVisible:
    id: "btn-start"
