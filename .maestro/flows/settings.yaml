# Settings: open modal, verify it appeared, scroll and tap restore purchases
# NOTE: React Native <Modal> is invisible to Maestro's accessibility tree on iOS.
# We use coordinate-based taps for modal interactions and verify by checking
# that the underlying game screen elements become hidden/visible.
appId: ${MAESTRO_APP_ID}
tags:
  - settings
  - pr
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- assertVisible:
    id: "btn-start"

# Open settings via accessibility label
- tapOn: "Settings"
- waitForAnimationToEnd
- waitForAnimationToEnd

# Modal is open — start button should be obscured behind the modal backdrop
# Tap "Restore Purchases" area (bottom of the modal, roughly 55% down the screen)
- tapOn:
    point: "50%,55%"
- waitForAnimationToEnd

# Dismiss any alert that appears (native alert IS visible to Maestro)
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
      - waitForAnimationToEnd

# Close settings by tapping above the modal
- tapOn:
    point: "50%,8%"
- waitForAnimationToEnd

# Back to idle — start button should be visible again
- assertVisible:
    id: "btn-start"
