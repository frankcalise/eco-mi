# Game over → tap Home link → returns to idle
appId: ${MAESTRO_APP_ID}
tags:
  - gameplay
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- tapOn:
    id: "btn-start"
- waitForAnimationToEnd

# Lose immediately (seed 42 expects green, tap red)
- tapOn:
    id: "btn-red"
- waitForAnimationToEnd

# Wait for game-over screen
- extendedWaitUntil:
    visible:
      id: "btn-play-again"
    timeout: 10000

- assertVisible:
    id: "btn-share"
- assertVisible:
    id: "btn-home"

# Tap home — returns to idle screen
- tapOn:
    id: "btn-home"
- waitForAnimationToEnd

- assertVisible:
    id: "btn-start"
