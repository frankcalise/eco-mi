# Game over → verify overlay elements and dismiss
# NOTE: The home/X button (btn-home) is not reliably findable by Maestro
# due to PressableScale + EaseView wrapper and small touch target.
# This will improve after game-over UX refactor.
appId: ${MAESTRO_APP_ID}
tags:
  - gameplay
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- tapOn:
    id: "btn-start"
- waitForAnimationToEnd

# Lose immediately (seed 42 expects green, tap red)
- tapOn:
    id: "btn-red"
- waitForAnimationToEnd

# Wait for game over overlay
- extendedWaitUntil:
    visible:
      id: "overlay-game-over"
    timeout: 10000

# Verify core overlay elements are present
- assertVisible:
    id: "btn-play-again"
- assertVisible:
    id: "btn-share"

# Use Play Again to dismiss and verify game restarts
- tapOn:
    id: "btn-play-again"
- waitForAnimationToEnd

- assertNotVisible:
    id: "overlay-game-over"
