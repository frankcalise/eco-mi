# Game over → tap Main Menu link → returns to idle
# Complete level 1 first (score 0 bypasses game-over now)
appId: ${MAESTRO_APP_ID}
tags:
  - gameplay
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- tapOn:
    id: "btn-start"

- waitForAnimationToEnd
- waitForAnimationToEnd

# Complete level 1 (green) to score 10
- tapOn:
    id: "btn-green"

- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd

# Fail level 2 (red when expected green)
- tapOn:
    id: "btn-red"

# Inline initials prompt on game-over (first-time)
- extendedWaitUntil:
    visible:
      id: "btn-skip-initials"
    timeout: 10000

- tapOn:
    id: "btn-skip-initials"

# Game-over screen CTAs
- extendedWaitUntil:
    visible:
      id: "btn-home"
    timeout: 5000

- assertVisible:
    id: "btn-share"

# Main Menu → back to idle
- tapOn:
    id: "btn-home"

- waitForAnimationToEnd

- assertVisible:
    id: "btn-start"
