# Leaderboard: navigate to dedicated /leaderboard screen, verify, go back
appId: ${MAESTRO_APP_ID}
tags:
  - navigation
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
- runFlow: ../shared/_dismiss-tracking.yaml

- assertVisible:
    id: "btn-start"

# Open leaderboard via accessibility label on idle trophy button
- tapOn: "Leaderboard"
- waitForAnimationToEnd

# Leaderboard screen visible
- assertVisible: "Leaderboard"

# Back via accessibility label on header back button
- tapOn: "Back"
- waitForAnimationToEnd

- assertVisible:
    id: "btn-start"
