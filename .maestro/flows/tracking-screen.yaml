# Tracking screen: verify ATT pre-permission screen on iOS first launch
appId: ${MAESTRO_APP_ID}
tags:
  - tracking
  - ios
onFlowStart:
  - runFlow: ../shared/_OnFlowStart.yaml
---
# On iOS with clearState, tracking pre-prompt should appear
# Tapping Continue fires the iOS system ATT dialog; dismiss with "Ask App Not to Track"
- runFlow:
    when:
      platform: iOS
    commands:
      - assertVisible: "Continue"
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Ask App Not to Track"
          commands:
            - tapOn: "Ask App Not to Track"
            - waitForAnimationToEnd
      - assertVisible:
          id: "btn-start"
