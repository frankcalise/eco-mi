# Dismiss the ATT tracking pre-prompt + iOS system dialog if present
# (iOS only, first launch after clearState)
appId: ${MAESTRO_APP_ID}
---
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Ask App Not to Track"
          commands:
            - tapOn: "Ask App Not to Track"
            - waitForAnimationToEnd
