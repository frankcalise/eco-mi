<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <!-- Subtle radial glow behind the buttons -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a4e" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </radialGradient>
    <!-- Button glows -->
    <filter id="buttonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="#1a1a2e" />
  <rect width="1024" height="500" fill="url(#glow)" />

  <!-- Simplified Simon board — 4 colored quadrants as rounded squares -->
  <!-- Positioned left of center -->
  <g transform="translate(320, 250)" filter="url(#buttonGlow)">
    <!-- Red — top left -->
    <rect x="-90" y="-90" width="80" height="80" rx="16" fill="#ef4444" opacity="0.9" />
    <!-- Blue — top right -->
    <rect x="10" y="-90" width="80" height="80" rx="16" fill="#3b82f6" opacity="0.9" />
    <!-- Green — bottom left -->
    <rect x="-90" y="10" width="80" height="80" rx="16" fill="#22c55e" opacity="0.9" />
    <!-- Yellow — bottom right -->
    <rect x="10" y="10" width="80" height="80" rx="16" fill="#eab308" opacity="0.9" />
    <!-- Center circle -->
    <circle cx="0" cy="0" r="24" fill="#1a1a2e" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  </g>

  <!-- App name — right of the board -->
  <g filter="url(#textGlow)">
    <text x="580" y="230" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="72" fill="#ffffff" letter-spacing="2">
      Eco Mi
    </text>
  </g>

  <!-- Tagline -->
  <text x="580" y="290" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#a0a0a0" letter-spacing="1">
    How far can you go?
  </text>

  <!-- Subtle decorative dots — sequence hint -->
  <g transform="translate(580, 330)" opacity="0.5">
    <circle cx="0" cy="0" r="5" fill="#ef4444" />
    <circle cx="20" cy="0" r="5" fill="#3b82f6" />
    <circle cx="40" cy="0" r="5" fill="#22c55e" />
    <circle cx="60" cy="0" r="5" fill="#eab308" />
    <circle cx="80" cy="0" r="5" fill="#ef4444" />
    <circle cx="100" cy="0" r="5" fill="rgba(255,255,255,0.2)" />
    <circle cx="120" cy="0" r="5" fill="rgba(255,255,255,0.2)" />
  </g>
</svg>
